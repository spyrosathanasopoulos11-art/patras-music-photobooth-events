<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patras Photobooth & Music Events</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* HERO */
header {
    position: relative;
    height: 100vh;
    background: url('hero.jpg') center/cover no-repeat;
}

header::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

.hero-content {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    z-index: 2;
}

.hero-logo {
    width: 200px;
    border-radius: 15px;
}

h1 {
    font-size: 28px;
    margin: 20px 0;
}

.phone {
    display: block;
    font-size: 22px;
    color: gold;
    text-decoration: none;
    margin-top: 10px;
}

/* ΚΟΥΜΠΙΑ ΚΑΤΩ */
.hero-buttons {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 90%;
    z-index: 2;
}

.btn {
    padding: 15px;
    text-align: center;
    border-radius: 12px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}

.btn-call {
    background: gold;
    color: black;
}

.btn-instagram {
    border: 2px solid white;
    color: white;
}

/* GALLERY */
.gallery {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 12px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
}
</style>

</head>

<body>

<header>

<div class="hero-content">
    <img src="logo.jpg" class="hero-logo">

    <h1>Patras Photobooth & Music Events</h1>

    <a href="tel:6932618810" class="phone">📞 6932618810</a>
</div>

<div class="hero-buttons">
    <a href="tel:6932618810" class="btn btn-call">Κάλεσε τώρα</a>
    <a href="https://instagram.com/wedding_photobooth_events" target="_blank" class="btn btn-instagram">Instagram</a>
</div>

</header>

<!-- GALLERY -->
<div class="gallery">
    <img src="new1.jpg">
    <img src="new2.jpg">
    <img src="new3.jpg">
    <img src="new4.jpg">
    <img src="new5.jpg">
    <img src="new6.jpg">
    <img src="new7.jpg">
    <img src="new8.jpg">
    <img src="new9.jpg">
    <img src="new10.jpg">
</div>

</body>
</html>
