<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patras Photobooth & Music Events</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    position: relative;
    min-height: 100vh;
    background:
    linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)),
    url('hero.jpg') center 42% / cover no-repeat;
    text-align: center;
    padding: 40px 20px;
}

/* TOP CONTENT */
.hero-top {
    z-index: 2;
    position: relative;
}

.hero-logo {
    width: 160px;
    margin-bottom: 15px;
    border-radius: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
}

h1 {
    font-size: 42px;
    margin: 10px 0;
}

.phone {
    color: #d4af37;
    font-size: 26px;
    font-weight: bold;
    text-decoration: none;
}

/* SPACE FOR COUPLE */
.hero-space {
    height: 260px;
}

/* BUTTONS DOWN */
.hero-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.btn {
    padding: 15px 25px;
    border-radius: 15px;
    font-weight: bold;
    width: 260px;
    text-align: center;
}

.btn-call {
    background: #d4af37;
    color: black;
}

.btn-instagram {
    border: 2px solid white;
    color: white;
}

/* SECTIONS */
section {
    padding: 60px 20px;
    text-align: center;
}

.services {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 20px;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 10px;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 10px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* FOOTER */
footer {
    background: black;
    padding: 20px;
}

@media(max-width:768px){
    h1 { font-size: 28px; }
    .hero-space { height: 220px; }
}
</style>
</head>

<body>

<header>

    <div class="hero-top">
        <img src="logo.jpg" class="hero-logo">

        <h1>Patras Photobooth & Music Events</h1>

        <a href="tel:6932618810" class="phone">📞 6932618810</a>
    </div>

    <div class="hero-space"></div>

    <div class="hero-buttons">
        <a href="tel:6932618810" class="btn btn-call">Κάλεσε τώρα</a>

        <a href="https://instagram.com/wedding_photobooth_events" 
           target="_blank" 
           class="btn btn-instagram">
           Instagram
        </a>
    </div>

</header>

<section>
<h2>Σχετικά με εμάς</h2>
<p>
Αναλαμβάνουμε γάμους και εκδηλώσεις με DJ, photobooth και επαγγελματικό εξοπλισμό.
</p>
</section>

<section>
<h2>Υπηρεσίες</h2>
<div class="services">
<div class="card">DJ & Μουσική</div>
<div class="card">Photobooth</div>
<div class="card">Φωτισμός</div>
<div class="card">Wedding Effects</div>
</div>
</section>

<section>
<h2>Gallery</h2>
<div class="gallery">
<img src="event1.jpg">
<img src="event2.jpg">
<img src="wedding1.jpg">
<img src="wedding2.jpg">
<img src="wedding3.jpg">
<img src="wedding4.jpg">
<img src="wedding7.jpg">
</div>
</section>

<footer>
© Patras Photobooth & Music Events
</footer>

</body>
</html>
