<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patras Music & Photobooth Events</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.overlay {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 10px;
}

.overlay img {
  width: 120px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: gold;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  display: inline-block;
}

/* SECTIONS */
section {
  padding: 60px 20px;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

/* GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.gallery img {
  width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

/* CONTACT */
.contact {
  background: #111;
  color: white;
}
</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <img src="images/logo.jpg">
    <h1>Patras Music & Photobooth Events</h1>
    <p>DJ Γάμου • Photobooth • Events</p>
    <a href="#contact" class="btn">Επικοινωνία</a>
  </div>
</section>

<!-- ΥΠΗΡΕΣΙΕΣ -->
<section>
  <h2>Υπηρεσίες</h2>
  <p>Αναλαμβάνουμε γάμους και εκδηλώσεις με επαγγελματικό εξοπλισμό και εμπειρία που κρατάει το γλέντι μέχρι το πρωί.</p>
</section>

<!-- ΓΑΜΟΙ -->
<section>
  <h2>Γάμοι</h2>
  <div class="gallery">
    <img src="images/wedding1.jpg">
    <img src="images/wedding2.jpg">
    <img src="images/wedding3.jpg">
    <img src="images/wedding4.jpg">
  </div>
</section>

<!-- EVENTS -->
<section>
  <h2>Events</h2>
  <div class="gallery">
    <img src="images/event1.jpg">
    <img src="images/event2.jpg">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Επικοινωνία</h2>
  <p>Τηλέφωνο: 6932618810</p>
</section>

</body>
</html>
