<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patras Music Events</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:black;
}

.logo {
  color:#d8b15a;
  font-weight:bold;
  font-size:22px;
}

nav a {
  margin-left:15px;
  color:white;
  text-decoration:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
}

.hero img {
  width:300px;
  margin-bottom:20px;
}

.hero h1 {
  font-size:32px;
}

.hero p {
  color:#ccc;
}

.btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#d8b15a;
  color:black;
  border-radius:25px;
  font-weight:bold;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Patras Music Events</div>
  <nav>
    <a href="#">Αρχική</a>
    <a href="#">Υπηρεσίες</a>
    <a href="#">Gallery</a>
    <a href="#">Σχετικά</a>
    <a href="#">Επικοινωνία</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">

  <!-- 🔥 ΤΟ LOGO ΣΤΗ ΜΕΣΗ -->
  <img src="images/logo.jpg" alt="logo">

  <h1>Μοναδικοί γάμοι με εντυπωσιακή είσοδο & δυνατή διασκέδαση</h1>

  <p>DJ γάμου, είσοδος ζευγαριού με fireworks, photobooth και premium ατμόσφαιρα</p>

  <a class="btn">Κλείσε ημερομηνία</a>

</section>

<!-- GALLERY -->
<section class="gallery">

  <img src="images/wedding1.jpg">
  <img src="images/wedding2.jpg">
  <img src="images/wedding3.jpg">
  <img src="images/wedding4.jpg">
  <img src="images/event1.jpg">
  <img src="images/event2.jpg">
  <img src="images/wedding10.jpg">
  <img src="images/wedding11.jpg">
  <img src="images/wedding12.jpg">

</section>

</body>
</html>
